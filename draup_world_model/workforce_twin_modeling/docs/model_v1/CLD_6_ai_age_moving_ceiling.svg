<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="mx" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="900" height="550" fill="#fafafa"/>

  <text x="450" y="35" text-anchor="middle" fill="#222" font-size="18" font-weight="bold">DIAGRAM 6 (Alternative): The AI Age — Moving Ceiling</text>
  <text x="450" y="55" text-anchor="middle" fill="#777" font-size="13" font-style="italic">"The ceiling rises while you climb — creating urgency and opportunity simultaneously"</text>

  <!-- Main loop: The Moving Ceiling -->

  <!-- AI capability frontier (exogenous - top) -->
  <text x="450" y="110" text-anchor="middle" fill="#888" font-size="14" font-weight="bold">AI capability</text>
  <text x="450" y="128" text-anchor="middle" fill="#888" font-size="14" font-weight="bold">frontier</text>
  <text x="450" y="145" text-anchor="middle" fill="#888" font-size="11">(exogenous — rising fast)</text>

  <!-- Etter assessment ceiling (left) -->
  <text x="180" y="225" text-anchor="middle" fill="#222" font-size="14" font-weight="bold">Etter assessment</text>
  <text x="180" y="243" text-anchor="middle" fill="#222" font-size="14" font-weight="bold">ceiling</text>

  <!-- Automation gap (center) -->
  <text x="450" y="250" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">Automation</text>
  <text x="450" y="268" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">gap</text>

  <!-- Current automation level (bottom center) -->
  <text x="450" y="400" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">Current automation</text>
  <text x="450" y="418" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">level</text>

  <!-- Urgency (right) -->
  <text x="720" y="230" text-anchor="middle" fill="#222" font-size="14" font-weight="bold">Urgency</text>

  <!-- Transformation investment (right lower) -->
  <text x="720" y="360" text-anchor="middle" fill="#222" font-size="14" font-weight="bold">Transformation</text>
  <text x="720" y="378" text-anchor="middle" fill="#222" font-size="14" font-weight="bold">investment</text>

  <!-- Competitive exposure (far right) -->
  <text x="850" y="290" text-anchor="middle" fill="#222" font-size="13">Competitive</text>
  <text x="850" y="308" text-anchor="middle" fill="#222" font-size="13">exposure</text>

  <!-- Arrows -->

  <!-- AI frontier → Etter ceiling (S) -->
  <path d="M 390,130 Q 280,170 210,210" fill="none" stroke="#999" stroke-width="1.8" marker-end="url(#mx)"/>
  <text x="290" y="170" fill="#999" font-size="14" font-weight="bold" font-style="italic">S</text>

  <!-- Etter ceiling → Automation gap (S) -->
  <path d="M 240,240 Q 340,248 400,255" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#mx)"/>
  <text x="320" y="238" fill="#555" font-size="14" font-weight="bold" font-style="italic">S</text>

  <!-- Current level → Automation gap (O) -->
  <path d="M 450,385 Q 448,340 450,282" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#mx)"/>
  <text x="465" y="340" fill="#555" font-size="15" font-weight="bold" font-style="italic">O</text>

  <!-- Automation gap → Urgency (S) -->
  <path d="M 505,255 Q 610,238 680,230" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#mx)"/>
  <text x="600" y="238" fill="#555" font-size="14" font-weight="bold" font-style="italic">S</text>

  <!-- Urgency → Transformation investment (S) -->
  <path d="M 720,245 Q 722,300 722,345" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#mx)"/>
  <text x="735" y="300" fill="#555" font-size="14" font-weight="bold" font-style="italic">S</text>

  <!-- Transformation investment → Current level (S) -->
  <path d="M 680,375 Q 580,400 510,408" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#mx)"/>
  <text x="600" y="400" fill="#555" font-size="14" font-weight="bold" font-style="italic">S</text>

  <!-- Gap → Competitive exposure (S) -->
  <path d="M 510,260 Q 700,265 810,290" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#mx)"/>
  <text x="670" y="268" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Competitive exposure → Urgency (S) -->
  <path d="M 840,282 Q 790,260 755,240" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#mx)"/>
  <text x="810" y="258" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Loop labels -->
  <!-- The main loop: Gap → Urgency → Investment → Level → Gap(O) -->
  <!-- S, S, S, O = 1 O = BALANCING (self-correcting: as you invest, gap closes) -->
  <text x="590" y="330" text-anchor="middle" fill="#0055aa" font-size="14" font-weight="bold">B1</text>
  <text x="590" y="345" text-anchor="middle" fill="#0055aa" font-size="9">(gap-closing)</text>

  <!-- But the ceiling keeps rising → gap reopens → REINFORCING pressure -->
  <!-- This is the meta-dynamic: B1 tries to close the gap, but the ceiling keeps opening it -->

  <!-- Rising ceiling annotation -->
  <path d="M 260,215 Q 250,175 350,120 Q 380,108 420,105" fill="none" stroke="#cc0000" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="270" y="160" fill="#cc0000" font-size="10" font-style="italic">ceiling keeps rising</text>
  <text x="270" y="173" fill="#cc0000" font-size="10" font-style="italic">→ gap reopens</text>

  <!-- KEY INSIGHT annotation -->
  <rect x="50" y="440" width="800" height="85" rx="8" fill="#f8f8f0" stroke="#888" stroke-width="1"/>
  <text x="450" y="462" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">THE AI AGE INSIGHT</text>
  <text x="450" y="482" text-anchor="middle" fill="#444" font-size="11">B1 (Automation gap → Urgency → Investment → Automation level → gap closes) is BALANCING — it self-corrects.</text>
  <text x="450" y="500" text-anchor="middle" fill="#444" font-size="11">But the exogenous AI frontier keeps rising, reopening the gap from above. The organization is on a treadmill.</text>
  <text x="450" y="518" text-anchor="middle" fill="#cc0000" font-size="11" font-weight="bold">Delay of investment ≠ status quo. Delay = falling behind. The opportunity cost of inaction is GROWING, not constant.</text>
</svg>
