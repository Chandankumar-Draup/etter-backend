<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#555"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#222"/>
    </marker>
    <marker id="arrowLight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#fafafa"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#222" font-size="18" font-weight="bold">DIAGRAM 1: The Capacity-Redistribution Loop</text>
  <text x="450" y="55" text-anchor="middle" fill="#777" font-size="13" font-style="italic">"The Fundamental Surprise" — Why linear headcount projections are always wrong</text>

  <!-- === MAIN VARIABLES === -->

  <!-- AI automation level (top left) -->
  <text x="130" y="140" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">AI automation</text>
  <text x="130" y="158" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">level</text>

  <!-- Freed capacity (top right) -->
  <text x="550" y="120" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">Freed</text>
  <text x="550" y="138" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">capacity</text>

  <!-- Headcount reduction (right) -->
  <text x="750" y="270" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">Headcount</text>
  <text x="750" y="288" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">reduction</text>

  <!-- Work redistribution (right lower) -->
  <text x="700" y="430" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">Work</text>
  <text x="700" y="448" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">redistribution</text>

  <!-- Workload per person (center bottom) -->
  <text x="450" y="540" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">Workload</text>
  <text x="450" y="558" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">per person</text>

  <!-- Ability to cope (center) -->
  <text x="340" y="370" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">Ability</text>
  <text x="340" y="388" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">to cope</text>

  <!-- Service quality (far left) -->
  <text x="80" y="310" text-anchor="middle" fill="#888" font-size="14">Service</text>
  <text x="80" y="328" text-anchor="middle" fill="#888" font-size="14">quality</text>

  <!-- Incidence of error (center right) -->
  <text x="540" y="370" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">Incidence</text>
  <text x="540" y="388" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">of error</text>

  <!-- Strain on management (upper center-right) -->
  <text x="620" y="230" text-anchor="middle" fill="#222" font-size="14">Strain on</text>
  <text x="620" y="248" text-anchor="middle" fill="#222" font-size="14">management</text>

  <!-- === EXTERNAL INPUTS (bottom left) === -->
  <text x="150" y="570" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">Effective</text>
  <text x="150" y="588" text-anchor="middle" fill="#222" font-size="15" font-weight="bold">staff capacity</text>

  <text x="60" y="640" text-anchor="middle" fill="#222" font-size="14" font-weight="bold">Headcount</text>

  <text x="260" y="650" text-anchor="middle" fill="#222" font-size="14" font-weight="bold">Training</text>

  <!-- === ARROWS === -->

  <!-- AI automation level → Freed capacity (S) -->
  <path d="M 200,140 Q 370,90 490,125" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="350" y="98" fill="#555" font-size="15" font-weight="bold" font-style="italic">S</text>

  <!-- Freed capacity → Headcount reduction (S) - curved right -->
  <path d="M 600,135 Q 720,170 740,255" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="700" y="185" fill="#555" font-size="15" font-weight="bold" font-style="italic">S</text>

  <!-- Headcount reduction → Work redistribution (S) -->
  <path d="M 745,300 Q 740,360 720,415" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="755" y="365" fill="#555" font-size="15" font-weight="bold" font-style="italic">S</text>

  <!-- Work redistribution → Workload per person (S) -->
  <path d="M 650,450 Q 560,490 510,530" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="590" y="500" fill="#555" font-size="15" font-weight="bold" font-style="italic">S</text>

  <!-- Workload per person → Ability to cope (O) - curved UP and LEFT -->
  <path d="M 400,530 Q 330,480 335,400" fill="none" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="340" y="475" fill="#555" font-size="16" font-weight="bold" font-style="italic">O</text>

  <!-- Ability to cope → Service quality (S) - light line going left -->
  <path d="M 290,375 Q 180,340 120,325" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrowLight)"/>
  <text x="190" y="340" fill="#999" font-size="14" font-weight="bold" font-style="italic">S</text>

  <!-- === INNER VICIOUS CYCLE (thicker lines) === -->

  <!-- Ability to cope → Incidence of error (O) - across -->
  <path d="M 385,375 Q 440,365 490,375" fill="none" stroke="#555" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="440" y="360" fill="#555" font-size="16" font-weight="bold" font-style="italic">O</text>

  <!-- Incidence of error → Strain on management (S) - up and right -->
  <path d="M 575,358 Q 610,300 620,260" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="610" y="310" fill="#555" font-size="15" font-weight="bold" font-style="italic">S</text>

  <!-- Strain on management → Workload [via Freed capacity area] (S) - loops back -->
  <path d="M 590,225 Q 530,190 550,160 Q 570,190 590,250" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Actually let me make this cleaner - strain adds to workload -->
  <!-- Strain on management → Workload per person (S) - big curve down -->

  <!-- Let me redo: Strain → feeds back to increase Workload -->
  <!-- Remove above, use direct path -->

  <!-- === EXTERNAL INPUT ARROWS (thinner, black) === -->

  <!-- Headcount → Effective staff capacity (S) -->
  <path d="M 95,630 Q 120,610 140,600" fill="none" stroke="#222" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="95" y="610" fill="#222" font-size="14" font-weight="bold" font-style="italic">S</text>

  <!-- Training → Effective staff capacity (S) -->
  <path d="M 240,640 Q 200,620 180,600" fill="none" stroke="#222" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="220" y="618" fill="#222" font-size="14" font-weight="bold" font-style="italic">S</text>

  <!-- Effective staff capacity → Ability to cope (S) -->
  <path d="M 180,560 Q 250,470 310,405" fill="none" stroke="#222" stroke-width="2.5" marker-end="url(#arrowDark)"/>
  <text x="225" y="485" fill="#222" font-size="15" font-weight="bold" font-style="italic">S</text>

  <!-- Strain on management → Workload per person (S) - curves down -->
  <path d="M 615,260 Q 580,400 500,530" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="575" y="415" fill="#555" font-size="15" font-weight="bold" font-style="italic">S</text>

  <!-- Loop label: Inner cycle -->
  <text x="485" y="455" text-anchor="middle" fill="#c00" font-size="12" font-weight="bold">R</text>
  <text x="485" y="470" text-anchor="middle" fill="#c00" font-size="10">(vicious cycle)</text>

  <!-- Annotation box -->
  <rect x="30" y="660" width="840" height="30" rx="4" fill="#f0f0f0" stroke="none"/>
  <text x="450" y="680" text-anchor="middle" fill="#666" font-size="11">Inner loop: Workload →O→ Ability to cope →O→ Errors →S→ Strain →S→ Workload = 2 O's (even) = REINFORCING vicious cycle</text>
</svg>
