<svg viewBox="0 0 1100 800" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#555"/>
    </marker>
    <marker id="arD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#333"/>
    </marker>
    <marker id="arL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#aaa"/>
    </marker>
  </defs>

  <rect width="1100" height="800" fill="#fafafa"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" fill="#222" font-size="18" font-weight="bold">DIAGRAM 5: The Integrated Master CLD — Workforce Twin</text>
  <text x="550" y="52" text-anchor="middle" fill="#777" font-size="13" font-style="italic">How 4 balancing and 4 reinforcing loops interact to produce workforce transformation dynamics</text>

  <!-- ============ CENTRAL HUB: AI automation level ============ -->
  <rect x="425" y="200" width="170" height="50" rx="8" fill="#fff" stroke="#222" stroke-width="2.5"/>
  <text x="510" y="222" text-anchor="middle" fill="#222" font-size="14" font-weight="bold">AI automation</text>
  <text x="510" y="240" text-anchor="middle" fill="#222" font-size="14" font-weight="bold">level</text>

  <!-- ============ TOP-LEFT: HUMAN DYNAMICS ============ -->
  <rect x="25" y="73" width="285" height="195" rx="10" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="168" y="93" text-anchor="middle" fill="#999" font-size="11" letter-spacing="1">HUMAN DYNAMICS</text>

  <!-- Resistance -->
  <text x="80" y="135" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Resistance</text>

  <!-- Trust in AI -->
  <text x="240" y="135" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Trust in AI</text>

  <!-- Adoption rate -->
  <text x="168" y="210" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Adoption rate</text>

  <!-- Disruption level -->
  <text x="80" y="255" text-anchor="middle" fill="#222" font-size="13">Disruption</text>
  <text x="80" y="268" text-anchor="middle" fill="#222" font-size="13">level</text>

  <!-- Resistance → Adoption rate (O) -->
  <path d="M 100,145 Q 130,175 148,198" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="110" y="178" fill="#555" font-size="13" font-weight="bold" font-style="italic">O</text>

  <!-- Trust → Adoption rate (S) -->
  <path d="M 220,145 Q 200,175 190,198" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="215" y="178" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Adoption rate → AI automation (S) -->
  <path d="M 210,210 Q 320,215 425,220" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="320" y="208" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- AI automation → Disruption (S) -->
  <path d="M 430,235 Q 250,270 125,262" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="280" y="265" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Disruption → Resistance (S) -->
  <path d="M 80,245 Q 78,195 80,148" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="65" y="200" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- B1 label -->
  <text x="130" y="168" text-anchor="middle" fill="#0055aa" font-size="11" font-weight="bold">B</text>

  <!-- ============ TOP-RIGHT: TRUST-PROFICIENCY ============ -->
  <rect x="690" y="73" width="285" height="195" rx="10" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="832" y="93" text-anchor="middle" fill="#999" font-size="11" letter-spacing="1">CAPABILITY</text>

  <!-- AI proficiency -->
  <text x="750" y="140" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">AI proficiency</text>

  <!-- Effective AI use -->
  <text x="910" y="140" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Effective AI use</text>

  <!-- Results quality -->
  <text x="832" y="220" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Results quality</text>

  <!-- Proficiency → Effective use (S) -->
  <path d="M 800,138 Q 840,130 870,135" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="840" y="128" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Effective use → Results (S) -->
  <path d="M 900,150 Q 880,180 855,210" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="890" y="185" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Results → Proficiency (via confidence + practice, simplified) (S) -->
  <path d="M 805,218 Q 770,190 755,155" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="770" y="192" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- R label -->
  <text x="832" y="175" text-anchor="middle" fill="#aa0000" font-size="11" font-weight="bold">R</text>

  <!-- Results → Trust (S) - connecting to left side -->
  <path d="M 790,225 Q 500,110 280,130" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arL)"/>
  <text x="540" y="148" fill="#aaa" font-size="12" font-style="italic">S (builds trust)</text>

  <!-- Effective use → AI automation (S) -->
  <path d="M 870,150 Q 770,185 595,215" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="730" y="195" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- ============ CENTER-RIGHT: SKILL DYNAMICS ============ -->

  <!-- Skill gap -->
  <text x="780" y="330" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Skill gap</text>

  <!-- AI automation → Skill gap (S) -->
  <path d="M 595,240 Q 690,275 750,320" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="680" y="278" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Skill gap → Effective AI use (O) -->
  <path d="M 800,320 Q 880,270 910,160" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="870" y="260" fill="#555" font-size="14" font-weight="bold" font-style="italic">O</text>

  <!-- B label for skill valley -->
  <text x="850" y="295" text-anchor="middle" fill="#0055aa" font-size="11" font-weight="bold">B</text>

  <!-- Training investment → Skill gap (O) -->
  <text x="920" y="380" text-anchor="middle" fill="#222" font-size="12" font-weight="bold">Training</text>
  <text x="920" y="395" text-anchor="middle" fill="#222" font-size="12" font-weight="bold">investment</text>
  <path d="M 890,375 Q 840,360 805,342" fill="none" stroke="#222" stroke-width="1.5" marker-end="url(#arD)"/>
  <text x="855" y="358" fill="#222" font-size="13" font-weight="bold" font-style="italic">O</text>

  <!-- Delay marker -->
  <rect x="840" y="345" width="40" height="14" rx="2" fill="#fff5f5" stroke="#c00" stroke-width="0.5"/>
  <text x="860" y="355" text-anchor="middle" fill="#c00" font-size="8" font-weight="bold">DELAY</text>

  <!-- ============ BOTTOM-CENTER: CAPACITY & WORKFORCE ============ -->
  <rect x="310" y="310" width="380" height="185" rx="10" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="500" y="330" text-anchor="middle" fill="#999" font-size="11" letter-spacing="1">OPERATIONAL CAPACITY</text>

  <!-- Freed capacity -->
  <text x="400" y="365" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Freed capacity</text>

  <!-- Workload per person -->
  <text x="600" y="365" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Workload</text>
  <text x="600" y="378" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">per person</text>

  <!-- Headcount reduction -->
  <text x="400" y="440" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Headcount</text>
  <text x="400" y="453" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">reduction</text>

  <!-- Work redistribution -->
  <text x="600" y="450" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Work</text>
  <text x="600" y="463" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">redistribution</text>

  <!-- AI automation → Freed capacity (S) -->
  <path d="M 490,250 Q 440,300 410,348" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="440" y="300" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Freed capacity → HC reduction (S) -->
  <path d="M 400,378 Q 398,405 400,425" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="385" y="405" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- HC reduction → Work redistribution (S) -->
  <path d="M 450,445 Q 520,455 560,452" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="510" y="460" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Work redistribution → Workload per person (S) -->
  <path d="M 600,438 Q 600,415 600,392" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="615" y="418" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Workload → Resistance (feeds up-left) (S) -->
  <path d="M 570,355 Q 350,280 110,145" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arL)"/>
  <text x="340" y="300" fill="#aaa" font-size="11" font-style="italic">S (feeds resistance)</text>

  <!-- ============ BOTTOM: FINANCIAL ============ -->
  <rect x="110" y="530" width="350" height="120" rx="10" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="285" y="548" text-anchor="middle" fill="#999" font-size="11" letter-spacing="1">FINANCIAL ENGINE</text>

  <!-- Cost savings -->
  <text x="200" y="585" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Cost savings</text>

  <!-- Transformation budget -->
  <text x="380" y="585" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Transformation</text>
  <text x="380" y="600" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">budget</text>

  <!-- Average seniority -->
  <text x="200" y="635" text-anchor="middle" fill="#222" font-size="12">Average seniority</text>

  <!-- HC reduction → Cost savings (S) -->
  <path d="M 370,465 Q 280,520 215,570" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="290" y="520" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Cost savings → Transformation budget (S) -->
  <path d="M 245,585 Q 300,582 340,585" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="295" y="577" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Budget → (feeds back up to) AI automation (S) via investment -->
  <path d="M 420,580 Q 500,500 510,260" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="475" y="430" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- R label for financial -->
  <text x="350" y="540" text-anchor="middle" fill="#aa0000" font-size="11" font-weight="bold">R</text>

  <!-- HC reduction → Avg seniority (S) -->
  <path d="M 370,470 Q 230,560 210,622" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="275" y="555" fill="#555" font-size="12" font-weight="bold" font-style="italic">S</text>

  <!-- Avg seniority → AI automation (O) - dampening -->
  <path d="M 170,628 Q 100,500 100,340 Q 100,260 430,235" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="90" y="400" fill="#555" font-size="14" font-weight="bold" font-style="italic">O</text>

  <!-- B label for seniority -->
  <text x="115" y="440" text-anchor="middle" fill="#0055aa" font-size="11" font-weight="bold">B</text>

  <!-- ============ BOTTOM-RIGHT: POLITICAL CAPITAL ============ -->
  <rect x="580" y="530" width="340" height="120" rx="10" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="750" y="548" text-anchor="middle" fill="#999" font-size="11" letter-spacing="1">POLITICAL CAPITAL</text>

  <!-- Transformation success -->
  <text x="650" y="585" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Transformation</text>
  <text x="650" y="600" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">success</text>

  <!-- Political capital -->
  <text x="840" y="585" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Political</text>
  <text x="840" y="600" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">capital</text>

  <!-- Results quality → Transformation success (S) -->
  <path d="M 820,235 Q 750,400 665,570" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="730" y="420" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Success → Political capital (S) -->
  <path d="M 705,590 Q 760,588 800,588" fill="none" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="755" y="582" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- Political capital → Resource allocation → Budget (S) -->
  <path d="M 840,575 Q 700,530 430,590" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="640" y="550" fill="#555" font-size="13" font-weight="bold" font-style="italic">S</text>

  <!-- R label -->
  <text x="770" y="570" text-anchor="middle" fill="#aa0000" font-size="11" font-weight="bold">R</text>

  <!-- ============ LEGEND ============ -->
  <rect x="30" y="700" width="1040" height="80" rx="6" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <text x="550" y="720" text-anchor="middle" fill="#222" font-size="12" font-weight="bold">LOOP INVENTORY</text>
  
  <text x="50" y="740" fill="#0055aa" font-size="11" font-weight="bold">BALANCING (4):</text>
  <text x="50" y="755" fill="#555" font-size="10">B: Resistance (speed→disruption→resistance→adoption↓) | B: Skill Valley (automation→gap→effective use↓) | B: Capacity Absorption (redistribution dampens reduction) | B: Seniority Offset (entry-level→senior mix→harder to automate)</text>
  
  <text x="50" y="773" fill="#aa0000" font-size="11" font-weight="bold">REINFORCING (4):</text>
  <text x="50" y="788" fill="#555" font-size="10">R: Trust-Adoption (outcomes→trust→willingness→adoption) | R: Proficiency (practice→proficiency→effective use→results) | R: Savings Flywheel (savings→budget→investment→automation) | R: Political Capital (success→capital→resources→capability)</text>
</svg>
