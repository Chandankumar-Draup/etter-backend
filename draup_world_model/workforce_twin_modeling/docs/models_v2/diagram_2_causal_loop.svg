  <!-- ════ LEGEND ════ -->
  <rect x="25" y="715" width="1050" height="145" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="550" y="738" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">LOOP INVENTORY — 9 Feedback Loops Determining System Behavior</text>

  <text x="50" y="762" fill="#2060a0" font-size="11" font-weight="bold">BALANCING (4 — dampen change):</text>
  <text x="50" y="779" fill="#555" font-size="9.5">B1: Capacity Absorption — freed hours redistributed to remaining workers (30→37% absorbed)</text>
  <text x="50" y="794" fill="#555" font-size="9.5">B2: Skill Valley — automation opens skill gaps → reduces effective AI use until reskilling catches up</text>
  <text x="50" y="809" fill="#555" font-size="9.5">B3: Change Resistance — disruption → resistance ↑ → readiness ↓ → adoption slows (counterbalanced by R5)</text>
  <text x="50" y="824" fill="#555" font-size="9.5">B4: Seniority Offset — entry-level roles automated first → remaining pool more senior → harder to automate</text>

  <text x="580" y="762" fill="#a03030" font-size="11" font-weight="bold">REINFORCING (5 — amplify change):</text>
  <text x="580" y="779" fill="#555" font-size="9.5">R1: Trust-Adoption — success → trust ↑ → willingness ↑ → more adoption</text>
  <text x="580" y="794" fill="#555" font-size="9.5">R2: Proficiency — practice → proficiency ↑ → effective use ↑ → better results</text>
  <text x="580" y="809" fill="#555" font-size="9.5">R3: Savings — savings → budget → reinvestment → more automation</text>
  <text x="580" y="824" fill="#555" font-size="9.5">R4: Political Capital — success → capital → resources → more capability</text>
  <text x="580" y="842" fill="#48a" font-size="10" font-weight="bold">R5: Readiness Boost — adoption success → readiness ↑ → faster adoption (NEW in v2.1)</text>
