<svg viewBox="0 0 1100 830" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="flow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#3070b0"/>
    </marker>
    <marker id="fout" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#b04040"/>
    </marker>
    <marker id="fkey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#886633"/>
    </marker>
    <marker id="fR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#6a4"/>
    </marker>
    <marker id="fRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#a64"/>
    </marker>
    <marker id="fBl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#48a"/>
    </marker>
    <marker id="fGr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#888"/>
    </marker>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#00000018"/>
    </filter>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9ff"/><stop offset="100%" stop-color="#eef1f8"/>
    </linearGradient>
    <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8f0"/><stop offset="100%" stop-color="#f5ece0"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="830" fill="#fafafa"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" fill="#222" font-size="17" font-weight="bold">STOCK-AND-FLOW DIAGRAM — Workforce Twin System Model v2.1</text>
  <text x="550" y="50" text-anchor="middle" fill="#888" font-size="12" font-style="italic">6 stocks, 12 flows, 9 feedback loops — the complete structural skeleton</text>
  <text x="550" y="66" text-anchor="middle" fill="#aaa" font-size="10">"A stock is the memory of the history of changing flows within the system" — Donella Meadows</text>

  <!-- ══════ STOCK 1: AI Adoption Level ══════ -->
  <rect x="435" y="95" width="200" height="52" rx="5" fill="url(#sg)" stroke="#334" stroke-width="2.5" filter="url(#sh)"/>
  <text x="535" y="117" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">AI Adoption Level</text>
  <text x="535" y="135" text-anchor="middle" fill="#555" font-size="10">0 → 90% (S-curve × human factors)</text>

  <!-- Inflow: technology deployment -->
  <polygon points="340,114 340,128 320,121" fill="#3070b0" opacity="0.7"/>
  <path d="M 280,121 L 435,121" fill="none" stroke="#3070b0" stroke-width="2.8" marker-end="url(#flow)"/>
  <text x="340" y="108" text-anchor="middle" fill="#3070b0" font-size="9.5" font-style="italic">technology deployment</text>
  <text x="270" y="126" text-anchor="middle" fill="#3070b0" font-size="8">S-curve rate</text>

  <!-- Outflow: dampening -->
  <path d="M 635,121 L 800,121" fill="none" stroke="#b04040" stroke-width="2" marker-end="url(#fout)"/>
  <text x="720" y="112" text-anchor="middle" fill="#b04040" font-size="9.5" font-style="italic">adoption dampening</text>
  <text x="720" y="136" text-anchor="middle" fill="#b04040" font-size="8">(human system × skill × seniority)</text>

  <!-- ══════ STOCK 2: Freed Capacity ══════ -->
  <rect x="65" y="230" width="170" height="50" rx="5" fill="url(#sg)" stroke="#334" stroke-width="2.5" filter="url(#sh)"/>
  <text x="150" y="252" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Freed Capacity</text>
  <text x="150" y="268" text-anchor="middle" fill="#555" font-size="10">hours/month</text>

  <!-- Adoption → Freed (flow) -->
  <path d="M 490,147 Q 350,195 235,238" fill="none" stroke="#3070b0" stroke-width="2" marker-end="url(#flow)"/>
  <text x="345" y="190" text-anchor="middle" fill="#3070b0" font-size="9" font-style="italic">automation frees hours</text>

  <!-- B1 Absorption outflow -->
  <path d="M 150,280 L 150,328" fill="none" stroke="#b04040" stroke-width="2" marker-end="url(#fout)"/>
  <polygon points="143,302 157,302 150,314" fill="#b04040" opacity="0.6"/>
  <text x="195" y="316" fill="#b04040" font-size="8.5">B1: absorption 30→37%</text>

  <!-- ══════ STOCK 3: Headcount ══════ -->
  <rect x="50" y="388" width="170" height="50" rx="5" fill="url(#sg)" stroke="#334" stroke-width="2.5" filter="url(#sh)"/>
  <text x="135" y="410" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Headcount</text>
  <text x="135" y="427" text-anchor="middle" fill="#555" font-size="10">540 → 474 (36 months)</text>

  <!-- Freed → HC (flow) -->
  <path d="M 150,328 Q 142,356 135,388" fill="none" stroke="#3070b0" stroke-width="2" marker-end="url(#flow)"/>
  <text x="108" y="360" fill="#3070b0" font-size="8.5" font-style="italic">net freed → FTEs</text>

  <!-- HC reduction outflow -->
  <path d="M 135,438 L 135,490" fill="none" stroke="#b04040" stroke-width="2" marker-end="url(#fout)"/>
  <text x="135" y="506" text-anchor="middle" fill="#888" font-size="9">quarterly reviews</text>
  <rect x="115" y="480" width="40" height="13" rx="2" fill="#fff5f5" stroke="#c44" stroke-width="0.6"/>
  <text x="135" y="490" text-anchor="middle" fill="#c44" font-size="7" font-weight="bold">DELAY</text>

  <!-- ══════ STOCK 4: Skill Gap ══════ -->
  <rect x="760" y="230" width="170" height="50" rx="5" fill="url(#sg)" stroke="#334" stroke-width="2.5" filter="url(#sh)"/>
  <text x="845" y="252" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Skill Gap</text>
  <text x="845" y="268" text-anchor="middle" fill="#555" font-size="10">sunrise skills needed</text>

  <!-- Adoption → Skill gap (flow) -->
  <path d="M 595,147 Q 720,190 760,250" fill="none" stroke="#b04040" stroke-width="2" marker-end="url(#fout)"/>
  <text x="695" y="188" text-anchor="middle" fill="#b04040" font-size="9" font-style="italic">automation opens gap</text>

  <!-- Reskilling closes gap -->
  <path d="M 930,255 L 1020,255" fill="none" stroke="#6a4" stroke-width="2" marker-end="url(#fR)"/>
  <text x="975" y="246" text-anchor="middle" fill="#6a4" font-size="9" font-style="italic">reskilling closes</text>
  <rect x="955" y="262" width="36" height="12" rx="2" fill="#fff5f5" stroke="#c44" stroke-width="0.5"/>
  <text x="973" y="271" text-anchor="middle" fill="#c44" font-size="7" font-weight="bold">DELAY</text>

  <!-- B2 feedback: Skill gap → dampens adoption -->
  <path d="M 845,230 Q 850,180 750,145 Q 680,128 635,121" fill="none" stroke="#2060a0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#fBl)"/>
  <text x="810" y="172" fill="#2060a0" font-size="9" font-style="italic">B2: gap drags adoption</text>

  <!-- ══════ STOCK 5: Financial Position ══════ -->
  <rect x="395" y="470" width="190" height="50" rx="5" fill="url(#sg)" stroke="#334" stroke-width="2.5" filter="url(#sh)"/>
  <text x="490" y="492" text-anchor="middle" fill="#222" font-size="13" font-weight="bold">Financial Position</text>
  <text x="490" y="509" text-anchor="middle" fill="#555" font-size="10">-$2.2M invest → +$4.66M net</text>

  <!-- Salary savings inflow -->
  <path d="M 220,435 Q 320,465 395,490" fill="none" stroke="#6a4" stroke-width="2" marker-end="url(#fR)"/>
  <text x="280" y="458" fill="#6a4" font-size="9" font-style="italic">salary savings</text>

  <!-- Cost outflow -->
  <path d="M 585,490 L 750,490" fill="none" stroke="#b04040" stroke-width="2" marker-end="url(#fout)"/>
  <text x="670" y="483" fill="#b04040" font-size="9" font-style="italic">license + training cost</text>

  <!-- R3: Savings → reinvestment → adoption boost -->
  <path d="M 490,470 Q 485,320 505,155" fill="none" stroke="#6a4" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#fR)"/>
  <text x="465" y="310" fill="#6a4" font-size="9" font-style="italic">R3: reinvest</text>

  <!-- ══════ STOCK 6: Human System (composite) ══════ -->
  <rect x="290" y="570" width="480" height="200" rx="10" fill="url(#hg)" stroke="#886633" stroke-width="2.2" filter="url(#sh)"/>
  <text x="530" y="592" text-anchor="middle" fill="#664422" font-size="14" font-weight="bold" letter-spacing="1.5">HUMAN SYSTEM STATE</text>
  <text x="530" y="608" text-anchor="middle" fill="#998866" font-size="9.5" font-style="italic">the binding constraint — determines how much of the technology ceiling is realized</text>

  <!-- Sub-stocks -->
  <rect x="315" y="625" width="120" height="38" rx="4" fill="#fff" stroke="#6a4" stroke-width="1.5"/>
  <text x="375" y="641" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Proficiency</text>
  <text x="375" y="656" text-anchor="middle" fill="#6a4" font-size="9.5">25 → 45</text>

  <rect x="460" y="625" width="120" height="38" rx="4" fill="#fff" stroke="#48a" stroke-width="1.5"/>
  <text x="520" y="641" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Readiness</text>
  <text x="520" y="656" text-anchor="middle" fill="#48a" font-size="9.5">45 → 55</text>

  <rect x="605" y="625" width="120" height="38" rx="4" fill="#fff" stroke="#a64" stroke-width="1.5"/>
  <text x="665" y="641" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Trust</text>
  <text x="665" y="656" text-anchor="middle" fill="#a64" font-size="9.5">35 → 46</text>

  <rect x="365" y="690" width="120" height="35" rx="4" fill="#fff" stroke="#777" stroke-width="1.2"/>
  <text x="425" y="706" text-anchor="middle" fill="#444" font-size="10" font-weight="bold">Pol. Capital</text>
  <text x="425" y="720" text-anchor="middle" fill="#777" font-size="9">60 → 71</text>

  <rect x="510" y="690" width="100" height="35" rx="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
  <text x="560" y="706" text-anchor="middle" fill="#555" font-size="10" font-weight="bold">Fatigue</text>
  <text x="560" y="720" text-anchor="middle" fill="#aaa" font-size="9">0 → 0</text>

  <!-- R2: Adoption → Proficiency -->
  <path d="M 475,147 Q 330,400 375,620" fill="none" stroke="#6a4" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#fR)"/>
  <text x="335" y="410" fill="#6a4" font-size="9" font-weight="bold">R2: practice → proficiency</text>

  <!-- R5: Adoption → Readiness -->
  <path d="M 535,147 Q 540,400 520,620" fill="none" stroke="#48a" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#fBl)"/>
  <text x="555" y="410" fill="#48a" font-size="9" font-weight="bold">R5: success → readiness</text>

  <!-- R1: Adoption → Trust -->
  <path d="M 590,147 Q 740,400 680,620" fill="none" stroke="#a64" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#fRed)"/>
  <text x="720" y="410" fill="#a64" font-size="9" font-weight="bold">R1: success → trust</text>

  <!-- B3: Disruption → erodes Readiness -->
  <path d="M 190,438 Q 310,545 460,620" fill="none" stroke="#b04040" stroke-width="1.3" stroke-dasharray="3,3" marker-end="url(#fout)"/>
  <text x="280" y="520" fill="#b04040" font-size="9">B3: disruption → resistance</text>

  <!-- THE KEY FEEDBACK: Human System → Adoption -->
  <path d="M 530,570 Q 530,450 Q 510,300 520,155" fill="none" stroke="#886633" stroke-width="3" marker-end="url(#fkey)"/>
  <rect x="410" y="340" width="160" height="40" rx="5" fill="#fff9f0" stroke="#886633" stroke-width="1.2"/>
  <text x="490" y="356" text-anchor="middle" fill="#664422" font-size="10.5" font-weight="bold">effective_multiplier</text>
  <text x="490" y="372" text-anchor="middle" fill="#886633" font-size="9.5">0.35p + 0.45r + 0.20t</text>

  <!-- R4: Political Capital → enables HC decisions -->
  <path d="M 425,725 Q 280,720 180,510 Q 165,460 220,415" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#fGr)"/>
  <text x="180" y="570" fill="#888" font-size="8.5">R4: capital enables decisions</text>

  <!-- B4: Seniority offset -->
  <path d="M 135,490 Q 80,580 80,640 Q 80,700 260,740 Q 290,730 290,580" fill="none" stroke="#2060a0" stroke-width="1.1" stroke-dasharray="3,3"/>
  <text x="82" y="625" fill="#2060a0" font-size="8.5">B4: seniority offset</text>

  <!-- ══════ LEGEND ══════ -->
  <rect x="30" y="785" width="1040" height="38" rx="5" fill="#f0f0f0" stroke="#ddd"/>
  <line x1="50" y1="805" x2="90" y2="805" stroke="#3070b0" stroke-width="2.8"/>
  <text x="95" y="809" fill="#555" font-size="9">Inflow</text>
  <line x1="150" y1="805" x2="190" y2="805" stroke="#b04040" stroke-width="2"/>
  <text x="195" y="809" fill="#555" font-size="9">Outflow</text>
  <line x1="260" y1="805" x2="300" y2="805" stroke="#886633" stroke-width="3"/>
  <text x="305" y="809" fill="#555" font-size="9">Key feedback</text>
  <line x1="420" y1="805" x2="460" y2="805" stroke="#6a4" stroke-width="1.6" stroke-dasharray="4,3"/>
  <text x="465" y="809" fill="#555" font-size="9">Reinforcing loop</text>
  <line x1="570" y1="805" x2="610" y2="805" stroke="#b04040" stroke-width="1.3" stroke-dasharray="3,3"/>
  <text x="615" y="809" fill="#555" font-size="9">Balancing loop</text>
  <rect x="720" y="798" width="34" height="15" rx="3" fill="#eef1f8" stroke="#334" stroke-width="1.5"/>
  <text x="760" y="809" fill="#555" font-size="9">Stock</text>
  <rect x="810" y="800" width="28" height="10" rx="2" fill="#fff5f5" stroke="#c44" stroke-width="0.5"/>
  <text x="843" y="809" fill="#555" font-size="9">Delay</text>
</svg>
