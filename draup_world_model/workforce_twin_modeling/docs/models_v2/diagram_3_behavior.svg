<svg viewBox="0 0 1100 860" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1100" height="860" fill="#fafafa"/>

  <text x="550" y="28" text-anchor="middle" fill="#222" font-size="17" font-weight="bold">SIMULATION BEHAVIOR вҖ” Reference Mode v2.1</text>
  <text x="550" y="48" text-anchor="middle" fill="#888" font-size="12" font-style="italic">Claims function, Copilot deployment, P2-Balanced policy, 36-month horizon</text>
  <text x="550" y="64" text-anchor="middle" fill="#aaa" font-size="10">"Stocks generally change slowly, even when the flows change suddenly" вҖ” Meadows</text>

  <!-- в•җв•җв•җв•җ CHART 1: ADOPTION в•җв•җв•җв•җ -->
  <rect x="80" y="90" width="940" height="200" fill="#fff" stroke="#ddd" stroke-width="0.5"/>
  <!-- Phase backgrounds -->
  <rect x="80" y="90" width="313" height="200" fill="#fff5f5" opacity="0.35"/>
  <rect x="393" y="90" width="314" height="200" fill="#f0fff0" opacity="0.35"/>
